<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Clinic Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: 600;
            color: #3b82f6;
            transition: all 0.3s;
        }
        .lang-toggle:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
        }
        [dir="rtl"] .lang-toggle {
            right: auto;
            left: 20px;
        }
    </style>
<base target="_blank">
</head>
<body class="login-page">

<button class="lang-toggle" onclick="I18n.toggle()" data-i18n="language">العربية</button>

<div class="login-card">
    <h2 data-i18n="loginTitle">Smart Clinic System</h2>
    <p data-i18n="loginSubtitle">Login to continue</p>

    <input type="text" id="username" class="form-control mb-3" data-i18n="username" placeholder="Username" onkeydown="handleLoginEnter(event)">
    <input type="password" id="password" class="form-control mb-3" data-i18n="password" placeholder="Password" onkeydown="handleLoginEnter(event)">

    <button class="btn btn-primary w-100" data-i18n="login" onclick="login()">Login</button>

    <p id="message" class="mt-3 text-danger"></p>
</div>

<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
