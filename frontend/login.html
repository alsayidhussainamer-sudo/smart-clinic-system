<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Clinic Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
<base target="_blank">
</head>
<body class="login-page">

<div class="login-card">
    <h2>Smart Clinic System</h2>
    <p>Login to continue</p>

    <input type="text" id="username" class="form-control mb-3" placeholder="Username" onkeydown="handleLoginEnter(event)">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" onkeydown="handleLoginEnter(event)">

    <button class="btn btn-primary w-100" onclick="login()">Login</button>

    <p id="message" class="mt-3 text-danger"></p>
</div>

<script src="js/auth.js"></script>
</body>
</html>
